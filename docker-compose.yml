services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openclaw-web
    restart: always
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      ROOMS_RUNNER: scheduler
    volumes:
      - ./.local:/app/.local
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openclaw-scheduler
    restart: always
    command: ["node", "--import", "tsx", "scheduler.ts"]
    environment:
      NODE_ENV: production
      SCHEDULER_INSTANCE_ID: scheduler-1
      ROOMS_RUNNER: scheduler
      AUTOMATION_TICK_INTERVAL_MS: 15000
      AUTOMATION_LEASE_TTL_MS: 30000
      AUTOMATION_MAX_ATTEMPTS: 3
      AUTOMATION_RETRY_BACKOFF_MS: 30000,120000,600000
      AUTOMATION_AUTO_PAUSE_FAILURES: 10
      AUTOMATION_HEARTBEAT_FILE: /app/.local/scheduler.heartbeat
    volumes:
      - ./.local:/app/.local
    depends_on:
      web:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const fs=require('fs');const p='/app/.local/scheduler.heartbeat';if(!fs.existsSync(p)){process.exit(1);}const age=Date.now()-fs.statSync(p).mtimeMs;process.exit(age<60000?0:1);",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
