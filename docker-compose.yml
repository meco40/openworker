services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openclaw-web
    restart: always
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      ROOMS_RUNNER: scheduler
      SCHEDULER_HEALTH_TOKEN: ${SCHEDULER_HEALTH_TOKEN:-}
      MEMORY_PROVIDER: mem0
      MEM0_BASE_URL: ${MEM0_BASE_URL}
      MEM0_API_KEY: ${MEM0_API_KEY}
      MEM0_API_PATH: ${MEM0_API_PATH:-/v1}
      MEM0_TIMEOUT_MS: ${MEM0_TIMEOUT_MS:-5000}
      MODEL_HUB_ENCRYPTION_KEY: ${MODEL_HUB_ENCRYPTION_KEY}
    volumes:
      - ./.local:/app/.local
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000/']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openclaw-scheduler
    restart: always
    command: ['node', '--import', 'tsx', 'scheduler.ts']
    environment:
      NODE_ENV: production
      SCHEDULER_INSTANCE_ID: scheduler-1
      ROOMS_RUNNER: scheduler
      MEMORY_PROVIDER: mem0
      MEM0_BASE_URL: ${MEM0_BASE_URL}
      MEM0_API_KEY: ${MEM0_API_KEY}
      MEM0_API_PATH: ${MEM0_API_PATH:-/v1}
      MEM0_TIMEOUT_MS: ${MEM0_TIMEOUT_MS:-5000}
      MODEL_HUB_ENCRYPTION_KEY: ${MODEL_HUB_ENCRYPTION_KEY}
      AUTOMATION_TICK_INTERVAL_MS: 15000
      AUTOMATION_LEASE_TTL_MS: 30000
      AUTOMATION_MAX_ATTEMPTS: 3
      AUTOMATION_RETRY_BACKOFF_MS: 30000,120000,600000
      AUTOMATION_AUTO_PAUSE_FAILURES: 10
      SCHEDULER_HEALTH_TOKEN: ${SCHEDULER_HEALTH_TOKEN:-}
    volumes:
      - ./.local:/app/.local
    depends_on:
      web:
        condition: service_started
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'if [ -n "$SCHEDULER_HEALTH_TOKEN" ]; then wget --no-verbose --tries=1 --header="x-scheduler-health-token: $SCHEDULER_HEALTH_TOKEN" --spider http://web:3000/api/health/scheduler; else wget --no-verbose --tries=1 --spider http://web:3000/api/health/scheduler; fi',
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
