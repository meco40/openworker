name: openai-worker-ci

on:
  pull_request:
    paths:
      - 'services/openai_worker/**'
      - 'src/server/worker/openai/**'
      - 'src/server/gateway/methods/worker.ts'
      - 'src/server/config/gatewayConfig.ts'
      - 'tests/**'
      - '.github/workflows/openai-worker-ci.yml'
  push:
    branches: [feat/openai-worker-integration]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test -- tests/unit/worker/openai-worker-runtime.test.ts tests/integration/worker/openai-event-ordering.test.ts tests/integration/worker/openai-duplicate-events.test.ts tests/integration/worker/openai-schema-version.test.ts tests/integration/worker/openai-runtime-failover.test.ts tests/integration/worker/openai-budget-enforcement.test.ts tests/integration/worker/openai-rate-limit.test.ts tests/load/worker-openai-load.test.ts
      - run: python -m pip install -e ./services/openai_worker
      - run: python -m pytest services/openai_worker/tests -q
