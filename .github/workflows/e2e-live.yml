name: E2E Live

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  live:
    name: Live Mem0 E2E
    if: ${{ secrets.MEM0_BASE_URL != '' && secrets.MEM0_API_KEY != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      MEM0_E2E: '1'
      MEM0_BASE_URL: ${{ secrets.MEM0_BASE_URL }}
      MEM0_API_KEY: ${{ secrets.MEM0_API_KEY }}
      MEM0_API_PATH: ${{ secrets.MEM0_API_PATH }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run live e2e
        run: npm run test:e2e:live

  skipped:
    name: Live E2E skipped (missing secrets)
    if: ${{ !(secrets.MEM0_BASE_URL != '' && secrets.MEM0_API_KEY != '') }}
    runs-on: ubuntu-latest
    steps:
      - name: Explain skip
        run: echo "Skipping live E2E because MEM0_BASE_URL or MEM0_API_KEY is not configured."
