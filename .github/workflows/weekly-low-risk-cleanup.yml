name: Weekly Low-Risk Cleanup

on:
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  analyze:
    name: Analyze Cleanup Candidates
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run low-risk analyze stage
        env:
          CLEANUP_DRAFT_PR_ENABLED: ${{ vars.CLEANUP_DRAFT_PR_ENABLED || '0' }}
        run: node scripts/ci/cleanup-low-risk.mjs analyze

  apply-and-open-draft-pr:
    name: Apply Cleanup and Open Draft PR
    needs: [analyze]
    if: ${{ vars.CLEANUP_DRAFT_PR_ENABLED == '1' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CLEANUP_DRAFT_PR_ENABLED: ${{ vars.CLEANUP_DRAFT_PR_ENABLED || '0' }}
      CLEANUP_MAX_FILES: '25'
      CLEANUP_MAX_CHANGED_LINES: '300'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply low-risk cleanup
        run: node scripts/ci/cleanup-low-risk.mjs apply

      - name: Run blocking gates for cleanup branch
        run: |
          pnpm run typecheck
          pnpm run lint
          pnpm run test
          pnpm run test:e2e:smoke

      - name: Create cleanup draft PR
        uses: peter-evans/create-pull-request@v7
        with:
          branch: cleanup/weekly-low-risk
          title: 'chore: weekly low-risk cleanup'
          body: |
            Weekly low-risk cleanup generated by automation.

            Guardrails:
            - max_files: 25
            - max_changed_lines: 300
            - forbidden paths excluded (`app/api/**`, `src/server/**`, `src/lib/db/migrations.ts`, `docs/contracts/**`)

            Blocking gates were executed before opening this draft PR.
          commit-message: 'chore: weekly low-risk cleanup'
          draft: true
          delete-branch: true
